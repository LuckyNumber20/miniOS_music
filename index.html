<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniOS Cloud Player</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121212;
            color: #00ff00;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .track-list, .folder-content {
            list-style: none;
            padding: 0;
        }
        .track-item, .folder-item {
            padding: 12px;
            margin: 8px 0;
            background: #252525;
            border-left: 4px solid #00ff00;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
        }
        .track-item:hover, .folder-item:hover {
            background: #333;
        }
        .folder-item {
            border-left: 4px solid #ffcc00;
            color: #ffcc00;
        }
        .hidden {
            display: none;
        }
        .back-btn {
            background: #333;
            color: #ffcc00;
            border: 1px solid #ffcc00;
            padding: 5px 10px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        audio {
            width: 100%;
            margin-top: 20px;
        }
        #now-playing {
            margin-top: 15px;
            font-size: 0.9em;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>MiniOS Music</h1>
    
    <div class="container">
        <div id="main-view">
            <h3>🎵 Public Tracks</h3>
            <ul id="public-list" class="track-list"></ul>
            
            <h3>📁 Directories</h3>
            <div id="folder-list"></div>
        </div>

        <div id="folder-view" class="hidden">
            <button class="back-btn" onclick="goBack()">⬅ Back to Main</button>
            <h3 id="current-folder-title">📁 Folder</h3>
            <ul id="vault-list" class="track-list"></ul>
        </div>

        <audio id="audio-player" controls></audio>
        <div id="now-playing">Status: Idle</div>
    </div>

    <script>
        const jsonUrl = "playlist.json";
        const audioPlayer = document.getElementById('audio-player');
        const nowPlaying = document.getElementById('now-playing');
        
        let playlistData = null;

        // Fetch directory structure mapping configurations
        fetch(jsonUrl)
            .then(response => response.json())
            .then(data => {
                playlistData = data;
                renderMenu();
            })
            .catch(err => {
                console.error("Error loading index file:", err);
                nowPlaying.innerText = "Error loading playlist tree config.";
            });

        function renderMenu() {
            const publicList = document.getElementById('public-list');
            const folderList = document.getElementById('folder-list');
            
            // 1. Render normal open public tracks
            publicList.innerHTML = "";
            playlistData.public_tracks.forEach(track => {
                const li = document.createElement('li');
                li.className = "track-item";
                li.innerHTML = `<span>▶ ${track.title}</span>`;
                li.onclick = () => playSong(track.file, track.title);
                publicList.appendChild(li);
            });

            // 2. Render structural directory locks
            folderList.innerHTML = "";
            if (playlistData.secret_vault) {
                const vault = playlistData.secret_vault;
                const div = document.createElement('div');
                div.className = "folder-item";
                div.innerHTML = `<span>📁 ${vault.folder_name} ${vault.is_locked ? '[LOCKED]' : ''}</span>`;
                div.onclick = () => accessFolder(vault);
                folderList.appendChild(div);
            }
        }

        function accessFolder(vault) {
            if (vault.is_locked) {
                // Challenge loop execution verification check block
                const attempt = prompt("Enter security passcode to unlock this folder:");
                if (attempt !== vault.passcode) {
                    alert("❌ Access Denied! Incorrect passcode.");
                    return;
                }
            }
            
            // Open the directory view pipeline state variables
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('folder-view').classList.remove('hidden');
            document.getElementById('current-folder-title').innerText = `📁 ${vault.folder_name}`;

            const vaultList = document.getElementById('vault-list');
            vaultList.innerHTML = "";
            
            vault.tracks.forEach(track => {
                const li = document.createElement('li');
                li.className = "track-item";
                li.innerHTML = `<span>🔒 ${track.title}</span>`;
                li.onclick = () => playSong(track.file, track.title);
                vaultList.appendChild(li);
            });
        }

        function goBack() {
            document.getElementById('folder-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
        }

        function playSong(filePath, title) {
            audioPlayer.src = filePath;
            audioPlayer.play();
            nowPlaying.innerText = `Playing: ${title}`;
        }
    </script>
</body>
</html>
