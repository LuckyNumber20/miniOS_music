<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniOS Background Player</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121212;
            
            /* Fullscreen background scaling configurations */
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: #00ff00;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            /* Smoothly fades the background when changing songs */
            transition: background-image 0.5s ease-in-out; 
        }
        h1 {
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .container {
            width: 100%;
            max-width: 500px;
            /* Semi-transparent panel so you can see the background art behind it */
            background: rgba(30, 30, 30, 0.85); 
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            backdrop-filter: blur(4px); /* Slight blur effect over the art */
        }
        .track-list {
            list-style: none;
            padding: 0;
        }
        .track-item, .folder-item {
            padding: 12px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid #00ff00;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
        }
        .track-item:hover, .folder-item:hover {
            background: rgba(0, 0, 0, 0.6);
        }
        .folder-item {
            border-left: 4px solid #ffcc00;
            color: #ffcc00;
        }
        .hidden {
            display: none;
        }
        .back-btn {
            background: #333;
            color: #ffcc00;
            border: 1px solid #ffcc00;
            padding: 5px 10px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        audio {
            width: 100%;
            margin-top: 20px;
        }
        #now-playing {
            margin-top: 15px;
            font-size: 0.9em;
            color: #fff;
            text-align: center;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

    <h1>MiniOS Music Console</h1>
    
    <div class="container">
        <div id="main-view">
            <h3>🎵 Public Tracks</h3>
            <ul id="public-list" class="track-list"></ul>
            
            <h3>📁 Directories</h3>
            <div id="folder-list"></div>
        </div>

        <div id="folder-view" class="hidden">
            <button class="back-btn" onclick="goBack()">⬅ Back</button>
            <h3 id="current-folder-title">📁 Folder</h3>
            <ul id="vault-list" class="track-list"></ul>
        </div>

        <audio id="audio-player" controls></audio>
        <div id="now-playing">Status: Idle</div>
    </div>

<script>
        const jsonUrl = "playlist.json";
        const audioPlayer = document.getElementById('audio-player');
        const nowPlaying = document.getElementById('now-playing');
        
        let playlistData = null;

        // Upgraded fetch block with safety catch chains
        fetch(jsonUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                playlistData = data;
                renderMenu();
            })
            .catch(err => {
                console.error("Failed to load playlist structure:", err);
                nowPlaying.style.color = "red";
                nowPlaying.innerText = "Error: " + err.message + " (Check playlist.json formatting!)";
            });

        function renderMenu() {
            const publicList = document.getElementById('public-list');
            const folderList = document.getElementById('folder-list');
            
            publicList.innerHTML = "";
            
            // Check if object key exists before looping
            if (playlistData && playlistData.public_tracks) {
                playlistData.public_tracks.forEach(track => {
                    const li = document.createElement('li');
                    li.className = "track-item";
                    li.innerHTML = `<span>▶ ${track.title}</span>`;
                    li.onclick = () => playSong(track.file, track.title, track.image);
                    publicList.appendChild(li);
                });
            }

            folderList.innerHTML = "";
            if (playlistData && playlistData.secret_vault) {
                const vault = playlistData.secret_vault;
                const div = document.createElement('div');
                div.className = "folder-item";
                div.innerHTML = `<span>📁 ${vault.folder_name}</span>`;
                div.onclick = () => accessFolder(vault);
                folderList.appendChild(div);
            }
        }

        function accessFolder(vault) {
            if (vault.is_locked) {
                const attempt = prompt("Enter passcode:");
                if (attempt !== vault.passcode) {
                    alert("❌ Denied!");
                    return;
                }
            }
            
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('folder-view').classList.remove('hidden');

            const vaultList = document.getElementById('vault-list');
            vaultList.innerHTML = "";
            
            if (vault.tracks) {
                vault.tracks.forEach(track => {
                    const li = document.createElement('li');
                    li.className = "track-item";
                    li.innerHTML = `<span>🔒 ${track.title}</span>`;
                    li.onclick = () => playSong(track.file, track.title, track.image);
                    vaultList.appendChild(li);
                });
            }
        }

        function goBack() {
            document.getElementById('folder-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
        }

        function playSong(filePath, title, imgPath) {
            audioPlayer.src = filePath;
            audioPlayer.play();
            nowPlaying.style.color = "#fff";
            nowPlaying.innerText = `Playing: ${title}`;
            
            if (imgPath) {
                document.body.style.backgroundImage = `url('${imgPath}')`;
            } else {
                document.body.style.backgroundImage = "none";
            }
        }
    </script>
</body>
</html>
