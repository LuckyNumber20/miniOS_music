<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniOS Minimalist Player</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121212;
            
            /* Fullscreen scaling setup */
            background-position: center;
            background-size: contain; 
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: #00ff00;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
            transition: background-image 0.5s ease-in-out; 
        }

        /* Ambient Header Hide class */
        h1.hidden {
            display: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(30, 30, 30, 0.85); 
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            margin-top: 20px;
        }

        /* Standard view utility toggles */
        .hidden {
            display: none !important;
        }

        .track-list {
            list-style: none;
            padding: 0;
        }
        .track-item, .folder-item {
            padding: 12px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid #00ff00;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
        }
        .track-item:hover, .folder-item:hover {
            background: rgba(0, 0, 0, 0.6);
        }
        .folder-item {
            border-left: 4px solid #ffcc00;
            color: #ffcc00;
        }
        .back-btn {
            background: #333;
            color: #ffcc00;
            border: 1px solid #ffcc00;
            padding: 5px 10px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        /* --- 📌 FIXED CORNER MINI-PLAYER PANEL --- */
        #mini-dock {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #00ff00;
            border-radius: 6px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        #mini-dock h4 {
            margin: 0;
            font-size: 0.95em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        #mini-dock audio {
            width: 100%;
        }

        .exit-btn {
            background: #cc0000;
            color: white;
            border: none;
            padding: 6px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            text-align: center;
            transition: background 0.2s;
        }

        .exit-btn:hover {
            background: #ff3333;
        }
    </style>
</head>
<body>

    <h1 id="main-header">MiniOS Music Console</h1>
    
    <div class="container" id="menu-container">
        <div id="main-view">
            <h3>Tracks</h3>
            <ul id="public-list" class="track-list"></ul>
            
            <h3>folders</h3>
            <div id="folder-list"></div>
        </div>

        <div id="folder-view" class="hidden">
            <button class="back-btn" onclick="goBack()">⬅ Back</button>
            <h3 id="current-folder-title">📁 Folder</h3>
            <ul id="vault-list" class="track-list"></ul>
        </div>
    </div>

    <div id="mini-dock" class="hidden">
        <h4 id="dock-title">Playing: Track Name</h4>
        <audio id="audio-player" controls></audio>
        <button class="exit-btn" onclick="exitAmbientMode()">Exit</button>
    </div>

    <script>
        const jsonUrl = "playlist.json";
        const audioPlayer = document.getElementById('audio-player');
        const dockTitle = document.getElementById('dock-title');
        const menuContainer = document.getElementById('menu-container');
        const mainHeader = document.getElementById('main-header');
        const miniDock = document.getElementById('mini-dock');
        
        let playlistData = null;

        fetch(jsonUrl)
            .then(response => response.json())
            .then(data => {
                playlistData = data;
                renderMenu();
            });

        function renderMenu() {
            const publicList = document.getElementById('public-list');
            const folderList = document.getElementById('folder-list');
            
            publicList.innerHTML = "";
            if (playlistData && playlistData.public_tracks) {
                playlistData.public_tracks.forEach(track => {
                    const li = document.createElement('li');
                    li.className = "track-item";
                    li.innerHTML = `<span>▶ ${track.title}</span>`;
                    li.onclick = () => playSong(track.file, track.title, track.image);
                    publicList.appendChild(li);
                });
            }

            folderList.innerHTML = "";
            if (playlistData && playlistData.secret_vault) {
                const vault = playlistData.secret_vault;
                const div = document.createElement('div');
                div.className = "folder-item";
                div.innerHTML = `<span>📁 ${vault.folder_name}</span>`;
                div.onclick = () => accessFolder(vault);
                folderList.appendChild(div);
            }
        }

        function accessFolder(vault) {
            if (vault.is_locked) {
                const attempt = prompt("Enter passcode:");
                if (attempt !== vault.passcode) {
                    alert("❌ Denied!");
                    return;
                }
            }
            
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('folder-view').classList.remove('hidden');

            const vaultList = document.getElementById('vault-list');
            vaultList.innerHTML = "";
            
            if (vault.tracks) {
                vault.tracks.forEach(track => {
                    const li = document.createElement('li');
                    li.className = "track-item";
                    li.innerHTML = `<span>🔒 ${track.title}</span>`;
                    li.onclick = () => playSong(track.file, track.title, track.image);
                    vaultList.appendChild(li);
                });
            }
        }

        function goBack() {
            document.getElementById('folder-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
        }

        // --- AMBIENT VIEW MODE PIPELINE TRIGGERS ---
        function playSong(filePath, title, imgPath) {
            audioPlayer.src = filePath;
            audioPlayer.play();
            
            // Set Dock Metadata Text
            dockTitle.innerText = `🎵 ${title}`;
            
            // Apply Background Image Canvas
            if (imgPath) {
                document.body.style.backgroundImage = `url('${imgPath}')`;
            } else {
                document.body.style.backgroundImage = "none";
            }

            // Hide Main Interfaces
            menuContainer.classList.add('hidden');
            mainHeader.classList.add('hidden');

            // Show Floating Dock
            miniDock.classList.remove('hidden');
        }

        function exitAmbientMode() {
            // Pause Audio playback engine state 
            audioPlayer.pause();

            // Clear active background graphic
            document.body.style.backgroundImage = "none";

            // Restore Main Layout Blocks
            menuContainer.classList.remove('hidden');
            mainHeader.classList.remove('hidden');

            // Hide Floating Dock
            miniDock.classList.add('hidden');
        }
    </script>
</body>
</html>
